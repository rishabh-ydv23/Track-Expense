name: Build and Deploy to AWS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/trackexpense-backend:${{ github.sha }} ./backend
          docker tag ${{ env.ECR_REGISTRY }}/trackexpense-backend:${{ github.sha }} ${{ env.ECR_REGISTRY }}/trackexpense-backend:latest
          docker push ${{ env.ECR_REGISTRY }}/trackexpense-backend:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/trackexpense-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/trackexpense-frontend:${{ github.sha }} ./frontend
          docker tag ${{ env.ECR_REGISTRY }}/trackexpense-frontend:${{ github.sha }} ${{ env.ECR_REGISTRY }}/trackexpense-frontend:latest
          docker push ${{ env.ECR_REGISTRY }}/trackexpense-frontend:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/trackexpense-frontend:latest

  deploy:
    name: Deploy to AWS ECS
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definitions
        run: |
          # Update backend task definition
          aws ecs update-service \
            --cluster trackexpense-prod \
            --service trackexpense-backend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          # Update frontend task definition
          aws ecs update-service \
            --cluster trackexpense-prod \
            --service trackexpense-frontend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster trackexpense-prod \
            --services trackexpense-backend trackexpense-frontend \
            --region ${{ env.AWS_REGION }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7-alpine
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password123
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh -u admin -p password123"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
